name: Build & Deploy

on:
  push:
    branches: [master]
  schedule:
    # Daily at 02:00 UTC — picks up upstream riscv-isa-manual changes
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      isa_sha: ${{ steps.decide.outputs.isa_sha }}
      asm_sha: ${{ steps.decide.outputs.asm_sha }}
      sbi_sha: ${{ steps.decide.outputs.sbi_sha }}
      iommu_sha: ${{ steps.decide.outputs.iommu_sha }}
      trace_sha: ${{ steps.decide.outputs.trace_sha }}
      server_platform_sha: ${{ steps.decide.outputs.server_platform_sha }}
      ctr_sha: ${{ steps.decide.outputs.ctr_sha }}
      debug_sha: ${{ steps.decide.outputs.debug_sha }}
      aia_sha: ${{ steps.decide.outputs.aia_sha }}
      upstream_stamp: ${{ steps.decide.outputs.upstream_stamp }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether to rebuild
        id: decide
        run: |
          set -euo pipefail

          get_sha() {
            git ls-remote "$1" HEAD | cut -f1
          }

          ISA_SHA="$(get_sha https://github.com/riscv/riscv-isa-manual.git)"
          ASM_SHA="$(get_sha https://github.com/riscv-non-isa/riscv-asm-manual.git)"
          SBI_SHA="$(get_sha https://github.com/riscv-non-isa/riscv-sbi-doc.git)"
          IOMMU_SHA="$(get_sha https://github.com/riscv-non-isa/riscv-iommu.git)"
          TRACE_SHA="$(get_sha https://github.com/riscv-non-isa/riscv-trace-spec.git)"
          SERVER_PLATFORM_SHA="$(get_sha https://github.com/riscv-non-isa/riscv-server-platform.git)"
          CTR_SHA="$(get_sha https://github.com/riscv/riscv-control-transfer-records.git)"
          DEBUG_SHA="$(get_sha https://github.com/riscv/riscv-debug-spec.git)"
          AIA_SHA="$(get_sha https://github.com/riscv/riscv-aia.git)"
          UPSTREAM_STAMP="riscv-isa-manual=$ISA_SHA;riscv-asm-manual=$ASM_SHA;riscv-sbi-doc=$SBI_SHA;riscv-iommu=$IOMMU_SHA;riscv-trace-spec=$TRACE_SHA;riscv-server-platform=$SERVER_PLATFORM_SHA;riscv-control-transfer-records=$CTR_SHA;riscv-debug-spec=$DEBUG_SHA;riscv-aia=$AIA_SHA"

          printf 'Upstream stamp: %s\n' "$UPSTREAM_STAMP"
          {
            echo "isa_sha=$ISA_SHA"
            echo "asm_sha=$ASM_SHA"
            echo "sbi_sha=$SBI_SHA"
            echo "iommu_sha=$IOMMU_SHA"
            echo "trace_sha=$TRACE_SHA"
            echo "server_platform_sha=$SERVER_PLATFORM_SHA"
            echo "ctr_sha=$CTR_SHA"
            echo "debug_sha=$DEBUG_SHA"
            echo "aia_sha=$AIA_SHA"
            echo "upstream_stamp=$UPSTREAM_STAMP"
          } >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Non-schedule trigger (${{ github.event_name }}) — always build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOYED_STAMP="$(curl -fsSL https://riscv.houmus.org/built-upstream-shas.txt 2>/dev/null | tr -d '[:space:]' || true)"
          echo "Deployed stamp: ${DEPLOYED_STAMP:-<none>}"

          if [ -z "$DEPLOYED_STAMP" ] || [ "$DEPLOYED_STAMP" != "$UPSTREAM_STAMP" ]; then
            echo "Upstream changed (or no stamp) — rebuild"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream change — skip"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout riscv-isa-manual
        uses: actions/checkout@v4
        with:
          repository: riscv/riscv-isa-manual
          ref: ${{ needs.check.outputs.isa_sha }}
          path: riscv-isa-manual
          submodules: recursive
          fetch-tags: true

      - name: Checkout riscv-asm-manual
        uses: actions/checkout@v4
        with:
          repository: riscv-non-isa/riscv-asm-manual
          ref: ${{ needs.check.outputs.asm_sha }}
          path: riscv-asm-manual
          submodules: recursive

      - name: Checkout riscv-sbi-doc
        uses: actions/checkout@v4
        with:
          repository: riscv-non-isa/riscv-sbi-doc
          ref: ${{ needs.check.outputs.sbi_sha }}
          path: riscv-sbi-doc
          submodules: recursive

      - name: Checkout riscv-iommu
        uses: actions/checkout@v4
        with:
          repository: riscv-non-isa/riscv-iommu
          ref: ${{ needs.check.outputs.iommu_sha }}
          path: riscv-iommu
          submodules: recursive

      - name: Checkout riscv-trace-spec
        uses: actions/checkout@v4
        with:
          repository: riscv-non-isa/riscv-trace-spec
          ref: ${{ needs.check.outputs.trace_sha }}
          path: riscv-trace-spec
          submodules: recursive

      - name: Checkout riscv-server-platform
        uses: actions/checkout@v4
        with:
          repository: riscv-non-isa/riscv-server-platform
          ref: ${{ needs.check.outputs.server_platform_sha }}
          path: riscv-server-platform
          submodules: recursive

      - name: Checkout riscv-control-transfer-records
        uses: actions/checkout@v4
        with:
          repository: riscv/riscv-control-transfer-records
          ref: ${{ needs.check.outputs.ctr_sha }}
          path: riscv-control-transfer-records
          submodules: recursive

      - name: Checkout riscv-debug-spec
        uses: actions/checkout@v4
        with:
          repository: riscv/riscv-debug-spec
          ref: ${{ needs.check.outputs.debug_sha }}
          path: riscv-debug-spec
          submodules: recursive

      - name: Checkout riscv-aia
        uses: actions/checkout@v4
        with:
          repository: riscv/riscv-aia
          ref: ${{ needs.check.outputs.aia_sha }}
          path: riscv-aia
          submodules: recursive

      - name: Resolve manual version
        working-directory: riscv-isa-manual
        run: |
          set -euo pipefail
          FULL_SHA=$(git rev-parse HEAD)
          if TAG=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            VER="$TAG"
            URL="https://github.com/riscv/riscv-isa-manual/releases/tag/$TAG"
          else
            VER=$(git rev-parse --short HEAD)
            URL="https://github.com/riscv/riscv-isa-manual/commit/$FULL_SHA"
          fi
          echo "Manual version: $VER ($URL)"
          echo "MANUAL_VERSION=$VER" >> "$GITHUB_ENV"
          echo "MANUAL_VERSION_URL=$URL" >> "$GITHUB_ENV"

      - name: Checkout asciidoctor-mdx
        uses: actions/checkout@v4
        with:
          repository: damageboy/asciidoctor-mdx
          path: asciidoctor-mdx-src

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/gems
          key: gems-${{ runner.os }}-ruby3.4-${{ hashFiles('.github/workflows/build-deploy.yml') }}
          restore-keys: gems-${{ runner.os }}-ruby3.4-

      - name: Install gems
        run: |
          export GEM_HOME="$GITHUB_WORKSPACE/vendor/gems"
          export PATH="$GEM_HOME/bin:$PATH"
          echo "GEM_HOME=$GEM_HOME" >> "$GITHUB_ENV"
          echo "$GEM_HOME/bin" >> "$GITHUB_PATH"
          gem install --no-document asciidoctor rouge asciidoctor-bibtex asciidoctor-lists asciidoctor-sail
          cd asciidoctor-mdx-src
          gem build asciidoctor-mdx.gemspec
          gem install --no-document asciidoctor-mdx-*.gem

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: node_modules-${{ runner.os }}-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: python3 -m pip install --user sympy

      - name: Generate MDX docs
        run: |
          mkdir -p "$HOME/bin"
          printf '#!/usr/bin/env bash\nexec asciidoctor --backend mdx --require asciidoctor-mdx "$@"\n' \
            > "$HOME/bin/asciidoctor-mdx"
          chmod +x "$HOME/bin/asciidoctor-mdx"
          ASCIIDOCTOR_MDX="$HOME/bin/asciidoctor-mdx" ./gen-mdx.sh
        env:
          MANUAL_DIR: ${{ github.workspace }}/riscv-isa-manual
          ASM_MANUAL_DIR: ${{ github.workspace }}/riscv-asm-manual
          SBI_DOC_DIR: ${{ github.workspace }}/riscv-sbi-doc
          IOMMU_DIR: ${{ github.workspace }}/riscv-iommu
          TRACE_SPEC_DIR: ${{ github.workspace }}/riscv-trace-spec
          SERVER_PLATFORM_DIR: ${{ github.workspace }}/riscv-server-platform
          CTR_DIR: ${{ github.workspace }}/riscv-control-transfer-records
          DEBUG_SPEC_DIR: ${{ github.workspace }}/riscv-debug-spec
          AIA_DIR: ${{ github.workspace }}/riscv-aia

      - name: Restore kroki diagram cache
        uses: actions/cache/restore@v4
        with:
          path: static/img/riscv-isa/kroki
          key: kroki-${{ hashFiles('docs/**/*.mdx') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            kroki-${{ hashFiles('docs/**/*.mdx') }}-
            kroki-

      - name: Stamp built upstream SHAs
        run: echo '${{ needs.check.outputs.upstream_stamp }}' > static/built-upstream-shas.txt

      - name: Purge cached build metadata
        run: rm -rf .docusaurus node_modules/.cache

      - name: Build Docusaurus site
        run: |
          for attempt in 1 2 3 4 5; do
            if bun run build; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            echo "Docusaurus build failed (attempt $attempt/5); retrying to reuse Kroki renders cached during this run."
            sleep $((attempt * 10))
          done

      - name: Save kroki diagram cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: static/img/riscv-isa/kroki
          key: kroki-${{ hashFiles('docs/**/*.mdx') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Keep dependency cache free of build metadata
        if: always()
        run: rm -rf .docusaurus node_modules/.cache

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
