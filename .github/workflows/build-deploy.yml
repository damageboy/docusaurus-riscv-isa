name: Build & Deploy

on:
  push:
    branches: [master]
  schedule:
    # Daily at 02:00 UTC — picks up upstream riscv-isa-manual changes
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      manual_sha: ${{ steps.decide.outputs.manual_sha }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether to rebuild
        id: decide
        run: |
          set -euo pipefail
          UPSTREAM_SHA="$(git ls-remote https://github.com/riscv/riscv-isa-manual.git HEAD | cut -f1)"
          echo "Upstream HEAD: $UPSTREAM_SHA"
          echo "manual_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Non-schedule trigger (${{ github.event_name }}) — always build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOYED_SHA="$(curl -fsSL https://riscv.houmus.org/built-manual-sha.txt 2>/dev/null | tr -d '[:space:]' || true)"
          echo "Deployed stamp: ${DEPLOYED_SHA:-<none>}"

          if [ -z "$DEPLOYED_SHA" ] || [ "$DEPLOYED_SHA" != "$UPSTREAM_SHA" ]; then
            echo "Upstream changed (or no stamp) — rebuild"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream change — skip"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout riscv-isa-manual
        uses: actions/checkout@v4
        with:
          repository: riscv/riscv-isa-manual
          ref: ${{ needs.check.outputs.manual_sha }}
          path: riscv-isa-manual
          submodules: recursive
          fetch-tags: true

      - name: Resolve manual version
        working-directory: riscv-isa-manual
        run: |
          set -euo pipefail
          FULL_SHA=$(git rev-parse HEAD)
          if TAG=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            VER="$TAG"
            URL="https://github.com/riscv/riscv-isa-manual/releases/tag/$TAG"
          else
            VER=$(git rev-parse --short HEAD)
            URL="https://github.com/riscv/riscv-isa-manual/commit/$FULL_SHA"
          fi
          echo "Manual version: $VER ($URL)"
          echo "MANUAL_VERSION=$VER" >> "$GITHUB_ENV"
          echo "MANUAL_VERSION_URL=$URL" >> "$GITHUB_ENV"

      - name: Checkout asciidoctor-mdx
        uses: actions/checkout@v4
        with:
          repository: damageboy/asciidoctor-mdx
          path: asciidoctor-mdx-src

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/gems
          key: gems-${{ runner.os }}-ruby3.4-${{ hashFiles('.github/workflows/build-deploy.yml') }}
          restore-keys: gems-${{ runner.os }}-ruby3.4-

      - name: Install gems
        run: |
          export GEM_HOME="$GITHUB_WORKSPACE/vendor/gems"
          export PATH="$GEM_HOME/bin:$PATH"
          echo "GEM_HOME=$GEM_HOME" >> "$GITHUB_ENV"
          echo "$GEM_HOME/bin" >> "$GITHUB_PATH"
          gem install --no-document asciidoctor rouge asciidoctor-bibtex asciidoctor-lists asciidoctor-sail
          cd asciidoctor-mdx-src
          gem build asciidoctor-mdx.gemspec
          gem install --no-document asciidoctor-mdx-*.gem

      - name: Restore kroki diagram cache
        uses: actions/cache@v4
        with:
          path: static/img/riscv-isa/kroki
          key: kroki-${{ hashFiles('docs/**/*.mdx') }}
          restore-keys: kroki-

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: node_modules-${{ runner.os }}-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Cache Docusaurus build cache
        uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('docusaurus.config.js', 'sidebars.js', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            docusaurus-${{ runner.os }}-${{ hashFiles('docusaurus.config.js', 'sidebars.js', 'bun.lock') }}-
            docusaurus-${{ runner.os }}-

      - name: Generate MDX docs
        run: |
          mkdir -p "$HOME/bin"
          printf '#!/usr/bin/env bash\nexec asciidoctor --backend mdx --require asciidoctor-mdx "$@"\n' \
            > "$HOME/bin/asciidoctor-mdx"
          chmod +x "$HOME/bin/asciidoctor-mdx"
          ASCIIDOCTOR_MDX="$HOME/bin/asciidoctor-mdx" ./gen-mdx.sh
        env:
          MANUAL_DIR: ${{ github.workspace }}/riscv-isa-manual

      - name: Stamp built riscv-isa-manual SHA
        run: echo "${{ needs.check.outputs.manual_sha }}" > static/built-manual-sha.txt

      - name: Build Docusaurus site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
